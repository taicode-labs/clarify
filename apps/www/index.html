<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Clarify is an open-source documentation publishing tool for MDX, OpenAPI, and static Vite deployments."
    />
    <link rel="icon" type="image/svg+xml" href="/clarify.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400..700&family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Clarify — MDX and OpenAPI documentation publishing</title>
    <script>
      ;(function () {
        try {
          var storedTheme = localStorage.getItem('clarify:theme')
          var theme = storedTheme === 'dark' || storedTheme === 'light' || storedTheme === 'system' ? storedTheme : 'system'
          var isDark = theme === 'system' ? window.matchMedia('(prefers-color-scheme: dark)').matches : theme === 'dark'
          document.documentElement.classList.toggle('dark', isDark)
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
        } catch (error) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/source/main.tsx"></script>
  </body>
</html>
