name: Publish

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs')
          const paths = [
            'package.json',
            'apps/apis/package.json',
            'apps/docs/package.json',
            'apps/www/package.json',
            'extensions/vscode/package.json',
            'packages/cli/package.json',
            'packages/renderer/package.json',
            'packages/templates/package.json',
          ]
          const releaseVersion = process.env.RELEASE_TAG.replace(/^v/, '')
          const mismatches = paths.filter(path => JSON.parse(fs.readFileSync(path, 'utf8')).version !== releaseVersion)
          if (mismatches.length > 0) {
            throw new Error(`Release ${releaseVersion} does not match: ${mismatches.join(', ')}`)
          }
          NODE

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package VS Code extension
        working-directory: extensions/vscode
        run: pnpm exec vsce package --no-dependencies

  publish-vscode-extension:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VS Code extension
        working-directory: extensions/vscode
        run: pnpm exec vite build

      - name: Package VS Code extension
        working-directory: extensions/vscode
        run: pnpm exec vsce package --no-dependencies

      - id: find-extension-asset
        run: |
          file=$(ls extensions/vscode/*.vsix | head -n 1)
          echo "asset=$file" >> "$GITHUB_OUTPUT"

      - name: Upload VS Code extension asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find-extension-asset.outputs.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-renderer:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check renderer package exists
        id: check-renderer
        run: |
          if npm view @clarify-labs/renderer@${{ github.event.release.tag_name }} version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build renderer
        if: steps.check-renderer.outputs.exists == 'false'
        run: pnpm --filter @clarify-labs/renderer build

      - name: Publish renderer
        if: steps.check-renderer.outputs.exists == 'false'
        working-directory: packages/renderer
        run: npm publish --access public

  publish-templates:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check templates package exists
        id: check-templates
        run: |
          if npm view @clarify-labs/templates@${{ github.event.release.tag_name }} version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build templates
        if: steps.check-templates.outputs.exists == 'false'
        run: pnpm --filter @clarify-labs/templates build

      - name: Publish templates
        if: steps.check-templates.outputs.exists == 'false'
        working-directory: packages/templates
        run: npm publish --access public

  publish-cli:
    runs-on: ubuntu-latest
    needs: [publish-renderer, publish-templates]
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check CLI package exists
        id: check-cli
        run: |
          if npm view @clarify-labs/cli@${{ github.event.release.tag_name }} version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CLI and dependencies
        if: steps.check-cli.outputs.exists == 'false'
        run: pnpm --filter @clarify-labs/cli... build

      - name: Prepare CLI package manifest
        if: steps.check-cli.outputs.exists == 'false'
        working-directory: packages/cli
        run: |
          node -e "const fs=require('node:fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.dependencies['@clarify-labs/renderer']=pkg.version; pkg.dependencies['@clarify-labs/templates']=pkg.version; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Publish CLI
        if: steps.check-cli.outputs.exists == 'false'
        working-directory: packages/cli
        run: npm publish --access public
